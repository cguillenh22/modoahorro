title: ModoAhorro
description: "Blog de finanzas personales para Perú: ahorro, deuda, inversión, presupuesto, seguros e impuestos."
url: "https://modoahorro.pe"

collections:
  articulos:
    output: true
    permalink: /articulos/:name.html

defaults:
  - scope:
      path: ""
      type: "articulos"
    values:
      layout: "articulo"
      date_published: "2026-07-18"
      date_modified: "2026-07-18"
      updated_label: "julio 2026"
  - scope:
      path: ""
    values:
      layout: "default"

# Markdown no se usa para el contenido (todo es HTML crudo dentro de los archivos),
# pero Jekyll lo requiere configurado igual.
markdown: kramdown

plugins:
  - jekyll-sitemap

exclude:
  - README.md
  - "*.py"
  - "*.js"
  - Gemfile
  - Gemfile.lock
