title: ModoAhorro
description: "Blog de finanzas personales para Perú: ahorro, deuda, inversión, presupuesto, seguros e impuestos."
url: "https://modoahorro.pe"

collections:
  articulos:
    output: true
    permalink: /articulos/:name.html

defaults:
  - scope:
      path: ""
      type: "articulos"
    values:
      layout: "articulo"
  - scope:
      path: ""
    values:
      layout: "default"

# Markdown no se usa para el contenido (todo es HTML crudo dentro de los archivos),
# pero Jekyll lo requiere configurado igual.
markdown: kramdown

exclude:
  - README.md
  - "*.py"
  - "*.js"
  - Gemfile
  - Gemfile.lock
