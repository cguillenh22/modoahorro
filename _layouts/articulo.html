---
layout: default
---
<article class="post">
  <div class="wrap">
    {% for cat in page.categories %}<span class="tag">{{ site.data.categories[cat] }}</span>{% endfor %}
    <h1>{{ page.title }}</h1>
    <div class="meta">{{ page.read_time }} min de lectura · Actualizado julio 2026</div>

    {{ content }}
  </div>
</article>
